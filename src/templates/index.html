<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Monitoreo de Ciberseguridad</title>
    <style>
        /* Diseño base (Modo Oscuro) */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Header y Componente de Estado */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .status-badge {
            background-color: #2e7d32; /* Verde por defecto */
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Contenedor principal estilo Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Componentes de Tarjetas para las Tablas */
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #90caf9;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Estilo de las Tablas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        th {
            color: #bdbdbd;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Centro de Monitoreo Local</h1>
        <div class="status-badge" id="api-status">API Operativa</div>
    </div>

    <div class="dashboard-grid">

        <div class="card">
            <h2>Monitor de Red (Puertos Abiertos)</h2>
            <table>
                <thead>
                    <tr>
                        <th>IP Destino</th>
                        <th>Puerto</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-puertos">
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Integridad de Archivos Locales</h2>
            <table>
                <thead>
                    <tr>
                        <th>Archivo</th>
                        <th>Alerta</th>
                    </tr>
                </thead>
                <tbody id="tabla-archivos">
                    </tbody>
            </table>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h2 style="color: #ef5350;">Centro de Alertas de Seguridad</h2>
            <table>
                <thead>
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Tipo</th>
                        <th>Nivel de Riesgo</th>
                        <th>Descripción</th>
                    </tr>
                </thead>
                <tbody id="body-alertas">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        // 1. Función de Salud del Sistema
        async function revisarEstadoAPI() {
            try {
                const respuesta = await fetch('/api/sistema');
                const datos = await respuesta.json();
                const badge = document.getElementById('api-status');

                if(datos.estado === 'operativo') {
                    badge.innerText = 'API Operativa';
                    badge.style.backgroundColor = '#2e7d32'; // Verde
                } else {
                    badge.innerText = 'Falla en Sistema';
                    badge.style.backgroundColor = '#d32f2f'; // Rojo
                }
            } catch (error) {
                const badge = document.getElementById('api-status');
                badge.innerText = 'API Desconectada';
                badge.style.backgroundColor = '#d32f2f'; // Rojo
            }
        }

       // 2. Función: Llenar tabla de Puertos Abiertos
        async function cargarPuertos() {
            try {
                // Modificamos el endpoint para pedir menos datos y no saturar
                const respuesta = await fetch('/api/puertos?cantidad=20');
                const puertos = await respuesta.json();
                const tabla = document.getElementById('tabla-puertos');

                tabla.innerHTML = ''; // Limpiamos la tabla

                // Historial temporal para evitar pintar registros repetidos
                let registrosVistos = new Set();

                puertos.forEach(evento => {
                    // Validamos que exista el dato
                    if (evento.evidencia_tecnica && !registrosVistos.has(evento.evidencia_tecnica)) {
                        registrosVistos.add(evento.evidencia_tecnica);

                        let partes = evento.evidencia_tecnica.split(' | ');
                        let ip = partes[0] ? partes[0].replace('IP: ', '').trim() : 'N/A';
                        let numPuerto = partes[1] ? partes[1].replace('Puerto: ', '').trim() : 'N/A';
                        let estado = partes[2] ? partes[2].replace('Estado: ', '').trim() : 'N/A';

                        const fila = `<tr>
                            <td>${ip}</td>
                            <td>${numPuerto}</td>
                            <td style="color: #ff9800;">${estado} (Riesgo ${evento.nivel_riesgo})</td>
                        </tr>`;
                        tabla.innerHTML += fila;
                    }
                });
            } catch (error) {
                console.log("Error al cargar puertos", error);
            }
        }

        // 3. Función: Llenar tabla de Integridad de Archivos
        async function cargarArchivos() {
            try {
                const respuesta = await fetch('/api/integridad');
                const archivos = await respuesta.json();
                const tabla = document.getElementById('tabla-archivos');

                tabla.innerHTML = ''; // Limpiamos la tabla

                archivos.forEach(archivo => {
                    let nombreArchivo = archivo.nombre;
                    const fila = `<tr>
                        <td>${nombreArchivo}</td>
                        <td style="color: #4caf50;">Monitoreado (Hash OK)</td>
                    </tr>`;
                    tabla.innerHTML += fila;
                });
            } catch (error) {
                console.log("Error al cargar archivos", error);
            }
        }

        // 4. NUEVA FUNCIÓN: Llenar tabla de Alertas (Iteración 9)
        async function cargarAlertas() {
            try {
                const respuesta = await fetch('/api/alertas');
                const alertas = await respuesta.json();
                const tabla = document.getElementById('body-alertas');

                tabla.innerHTML = ''; // Limpiamos antes de actualizar

                alertas.forEach(alerta => {
                    // Si el riesgo es Crítico lo pintamos rojo, si es Alto lo pintamos naranja
                    let colorRiesgo = alerta.riesgo === 'Crítico' ? '#ef5350' : '#ff9800';

                    const fila = `<tr>
                        <td>${alerta.fecha}</td>
                        <td>${alerta.tipo}</td>
                        <td style="color: ${colorRiesgo}; font-weight: bold;">${alerta.riesgo}</td>
                        <td>${alerta.descripcion}</td>
                    </tr>`;
                    tabla.innerHTML += fila;
                });
            } catch (error) {
                console.log("Error al cargar alertas:", error);
            }
        }

        // Ejecutar todo al cargar la página y mantener el monitoreo
        window.onload = () => {
            revisarEstadoAPI();
            cargarPuertos();
            cargarArchivos();
            cargarAlertas(); // Arrancamos la carga de alertas

            // Actualizar el estado cada 5 segundos
            setInterval(revisarEstadoAPI, 5000);

            // Actualizar todas las tablas cada 10 segundos
            setInterval(() => {
                cargarPuertos();
                cargarArchivos();
                cargarAlertas(); // Se actualiza junto con el resto
            }, 10000);
        };
    </script>
</body>
</html>
